# test_chambers/sunken_shipwreck.yaml
# The player starts on the ocean surface above a half-buried shipwreck.
# Goal: dive down, fight off drowned, loot the buried treasure chest, and surface
# before drowning. No boat. No water breathing. Just pressure and timing.

name: sunken_shipwreck
description: "Ocean dive — breach a drowned-infested wreck and recover buried treasure"
seed: 4488

features:
  biome: minecraft:ocean
  time: noon
  weather: clear
  difficulty: normal

  ores:
    - type: clay
      count: [4, 8]
      area: [-14, -63, -14, 14, -63, 14]
      vein_size: 2

    - type: gravel
      count: [3, 6]
      area: [-12, -63, -12, 12, -63, 12]
      vein_size: 2

  mobs:
    - type: drowned
      count: [3, 5]
      area: [-12, -62, -12, 12, -62, 12]
      difficulty: normal

    - type: guardian
      count: [1, 2]
      area: [-14, -62, -14, 14, -62, 14]
      difficulty: hard

  gamerule_overrides:
    doMobSpawning: "false"

  raw_cmds:
    # Flood the entire chamber to simulate the ocean floor
    - "fill -16 -64 -16 16 -55 16 water"
    # Sandy ocean floor
    - "fill -16 -63 -16 16 -63 16 sand"
    # Shipwreck hull — oak planks with a hole in the side
    - "fill -6 -63 -6 6 -58 6 oak_planks hollow"
    - "fill -6 -61 -6 6 -61 -4 air"
    - "fill -2 -63 -2 2 -63 2 air"
    - "setblock 0 -63 0 chest{Items:[{id:\"minecraft:diamond\",Count:5b,Slot:0b},{id:\"minecraft:emerald\",Count:8b,Slot:1b},{id:\"minecraft:golden_apple\",Count:2b,Slot:2b},{id:\"minecraft:nautilus_shell\",Count:3b,Slot:3b}]}"
    # Waterlogged planks and kelp to make the wreck feel organic
    - "setblock -5 -62 -5 oak_planks"
    - "setblock 5 -62 5 oak_planks"
    - "setblock -7 -63 2 seagrass"
    - "setblock 8 -63 -4 seagrass"
    - "setblock 3 -63 -9 tall_seagrass[half=lower]"
    - "setblock 3 -62 -9 tall_seagrass[half=upper]"
    - "setblock -10 -63 6 kelp[age=14]"
    - "setblock -10 -62 6 kelp[age=14]"
    - "setblock -10 -61 6 kelp_plant"
    # Coral scattered around the base
    - "setblock 9 -63 -9 brain_coral_block"
    - "setblock -11 -63 -3 tube_coral_block"
    - "setblock 6 -63 11 fire_coral_block"
    # Air pocket inside the cabin at the top — one gasp of air if you find it
    - "fill -3 -57 -3 3 -57 3 oak_planks"
    - "fill -2 -56 -2 2 -56 2 air"

sim_state:
  biomes: [ocean, deep_ocean, cold_ocean]
  y_range: [40, 65]
  nearby_blocks: [water, sand, gravel, oak_planks, clay, seagrass, kelp,
                  brain_coral_block, tube_coral_block]
  mob_count: 5
  mob_pool: [drowned, guardian]
  light_range: [6, 13]
