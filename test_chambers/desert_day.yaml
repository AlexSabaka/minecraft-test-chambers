# test_chambers/desert_day.yaml
# Scorching desert at midday — sand floor, surface gold, husks lurking.
# Designed for extreme-heat survival with scarce resources.

name: desert_day
description: "Arid desert in blazing daylight — sand floor, gold outcrops, hostile husks"

features:
  biome: minecraft:desert
  time: noon
  weather: clear
  difficulty: hard

  ores:
    - type: gold_ore
      count: [2, 5]
      area: [-14, -63, -14, 14, -63, 14]
      replace: sand

    - type: coal_ore
      count: [1, 3]
      area: [-12, -63, -12, 12, -63, 12]
      replace: sand

  mobs:
    - type: husk
      count: [2, 4]
      area: [-13, -62, -13, 13, -62, 13]
      difficulty: hard

    - type: skeleton
      count: [0, 2]
      area: [-13, -62, -13, 13, -62, 13]
      difficulty: hard

  inventory:
    mainhand: stone_sword
    items:
      stone_sword: 1
      leather_helmet: 1

  gamerule_overrides:
    doMobSpawning: "false"

  raw_cmds:
    # Replace grass floor with sand/sandstone
    - "fill -30 -63 -30 30 -63 30 sand"
    # Scatter some sandstone patches
    - "setblock -8 -63 -8 sandstone"
    - "setblock 7 -63 -4 sandstone"
    - "setblock -3 -63 9 sandstone"
    - "setblock 11 -63 6 sandstone"
    # Exposed dead bush decorations
    - "setblock -6 -62 5 dead_bush"
    - "setblock 8 -62 -7 dead_bush"
    - "setblock -11 -62 2 dead_bush"
    # Cactus patches
    - "setblock 5 -63 -12 cactus"
    - "setblock 5 -62 -12 cactus"
    - "setblock -10 -63 10 cactus"
    - "setblock -10 -62 10 cactus"
