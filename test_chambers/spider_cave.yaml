# test_chambers/spider_cave.yaml
# Dark dripstone cavern overrun with spiders and cave spiders.
# Walls are draped in cobwebs — movement is slow and terrifying.

name: spider_cave
description: "Dark dripstone cave full of spiders, cobwebs, and little hope"
seed: 255

features:
  biome: minecraft:dripstone_caves
  time: midnight
  weather: clear
  difficulty: hard

  ores:
    - type: deepslate_coal_ore
      count: [3, 6]
      area: [-10, -63, -10, 10, -63, 10]
      vein_size: 2

    - type: gravel
      count: [4, 8]
      area: [-12, -63, -12, 12, -63, 12]
      vein_size: 2

  mobs:
    - type: spider
      count: [3, 5]
      area: [-12, -62, -12, 12, -62, 12]
      difficulty: hard

    - type: cave_spider
      count: [2, 4]
      area: [-10, -62, -10, 10, -62, 10]
      difficulty: hard

    - type: silverfish
      count: [1, 3]
      area: [-8, -62, -8, 8, -62, 8]
      difficulty: normal

  gamerule_overrides:
    doMobSpawning: "false"

  raw_cmds:
    # Replace the floor with deepslate for cave feel
    - "fill -30 -63 -30 30 -63 30 deepslate"
    # Cobweb clusters scattered across the chamber
    - "fill -8 -62 -8 -4 -62 -4 cobweb"
    - "fill 3 -62 2 7 -62 6 cobweb"
    - "fill -5 -62 6 -1 -62 10 cobweb"
    # Dripstone stalagmites
    - "setblock -7 -62 -9 pointed_dripstone[vertical_direction=up,thickness=base]"
    - "setblock -7 -61 -9 pointed_dripstone[vertical_direction=up,thickness=tip]"
    - "setblock 9 -62 3 pointed_dripstone[vertical_direction=up,thickness=base]"
    - "setblock 9 -61 3 pointed_dripstone[vertical_direction=up,thickness=tip]"
    # Stalactites
    - "setblock -3 -58 -7 pointed_dripstone[vertical_direction=down,thickness=base]"
    - "setblock -3 -59 -7 pointed_dripstone[vertical_direction=down,thickness=tip]"

sim_state:
  biomes: [dripstone_caves, lush_caves, deep_dark]
  y_range: [5, 30]
  nearby_blocks: [deepslate, cobweb, gravel, deepslate_coal_ore, pointed_dripstone, stone]
  mob_count: 9
  mob_pool: [spider, cave_spider, silverfish]
  light_range: [0, 3]
