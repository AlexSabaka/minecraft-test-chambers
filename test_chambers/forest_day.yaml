# test_chambers/forest_day.yaml
# Dense forest during daytime. Rich gathering environment with logs and leaves.
# Good for resource-collection and survival scenarios.

name: forest_day
description: "Dense forest in daylight — oak and birch trees, no mobs"
seed: 101

features:
  biome: minecraft:forest
  time: day
  weather: clear
  difficulty: normal

  trees:
    - type: oak
      count: [4, 7]
      area: [-12, -63, -12, 12, -63, 12]

    - type: birch
      count: [2, 4]
      area: [-11, -63, -11, 11, -63, 11]

    - type: dark_oak
      count: [1, 2]
      area: [-8, -63, -8, 8, -63, 8]

  # A few surface coal outcrops for resource-finding scenarios
  ores:
    - type: coal_ore
      count: [3, 6]
      area: [-10, -63, -10, 10, -63, 10]
      replace: grass_block

  gamerule_overrides:
    doMobSpawning: "false"

# (legacy rcon_cmds archived; no longer executed)
_rcon_cmds_archive:
  # --- Oak Tree 1 (3, -59, 3) ---
  - "setblock 3 -59 3 oak_log"
  - "setblock 3 -58 3 oak_log"
  - "setblock 3 -57 3 oak_log"
  - "setblock 3 -56 3 oak_log"
  - "setblock 3 -55 3 oak_log"
  # Leaves Canopy
  - "setblock 3 -54 3 oak_leaves"
  - "setblock 4 -54 3 oak_leaves"
  - "setblock 2 -54 3 oak_leaves"
  - "setblock 3 -54 4 oak_leaves"
  - "setblock 3 -54 2 oak_leaves"
  - "setblock 4 -54 4 oak_leaves"
  - "setblock 2 -54 2 oak_leaves"
  - "setblock 4 -54 2 oak_leaves"
  - "setblock 2 -54 4 oak_leaves"
  - "setblock 3 -53 3 oak_leaves"
  - "setblock 4 -53 3 oak_leaves"
  - "setblock 2 -53 3 oak_leaves"
  - "setblock 3 -53 4 oak_leaves"
  - "setblock 3 -53 2 oak_leaves"
  - "setblock 3 -52 3 oak_leaves"

  # --- Birch Tree 1 (-3, -59, -3) ---
  - "setblock -3 -59 -3 birch_log"
  - "setblock -3 -58 -3 birch_log"
  - "setblock -3 -57 -3 birch_log"
  - "setblock -3 -56 -3 birch_log"
  - "setblock -3 -55 -3 birch_log"
  - "setblock -3 -54 -3 birch_log"
  # Leaves Canopy (Birch are taller/thinner)
  - "setblock -3 -53 -3 birch_leaves"
  - "setblock -2 -53 -3 birch_leaves"
  - "setblock -4 -53 -3 birch_leaves"
  - "setblock -3 -53 -2 birch_leaves"
  - "setblock -3 -53 -4 birch_leaves"
  - "setblock -3 -52 -3 birch_leaves"
  - "setblock -2 -52 -3 birch_leaves"
  - "setblock -4 -52 -3 birch_leaves"
  - "setblock -3 -52 -2 birch_leaves"
  - "setblock -3 -52 -4 birch_leaves"

  # --- Oak Tree 2 (6, -59, -2) ---
  - "setblock 6 -59 -2 oak_log"
  - "setblock 6 -58 -2 oak_log"
  - "setblock 6 -57 -2 oak_log"
  - "setblock 6 -56 -2 oak_log"
  - "setblock 6 -55 -2 oak_log"
  # Leaves Canopy
  - "setblock 6 -54 -2 oak_leaves"
  - "setblock 7 -54 -2 oak_leaves"
  - "setblock 5 -54 -2 oak_leaves"
  - "setblock 6 -54 -1 oak_leaves"
  - "setblock 6 -54 -3 oak_leaves"
  - "setblock 7 -54 -1 oak_leaves"
  - "setblock 5 -54 -3 oak_leaves"
  - "setblock 7 -54 -3 oak_leaves"
  - "setblock 5 -54 -1 oak_leaves"
  - "setblock 6 -53 -2 oak_leaves"
  - "setblock 7 -53 -2 oak_leaves"
  - "setblock 5 -53 -2 oak_leaves"
  - "setblock 6 -53 -1 oak_leaves"
  - "setblock 6 -53 -3 oak_leaves"
  - "setblock 6 -52 -2 oak_leaves"

sim_state:
  biomes: [forest, birch_forest, taiga, dark_forest]
  y_range: [60, 80]
  nearby_blocks: [oak_log, birch_log, dark_oak_log, oak_leaves, birch_leaves,
                  stone, dirt, grass_block, gravel, coal_ore]
  mob_count: 0
  mob_pool: []
  light_range: [10, 14]
