# test_chambers/jungle_ruins.yaml
# Dense jungle with hidden emerald and a ruined dungeon to explore.
# Tropical rain, high mob danger in the undergrowth.

name: jungle_ruins
description: "Dense jungle in tropical rain — emerald veins, ruined dungeon, hidden dangers"

features:
  biome: minecraft:jungle
  time: day
  weather: rain
  difficulty: normal

  trees:
    - type: jungle
      count: [4, 7]
      area: [-14, -63, -14, 14, -63, 14]

    - type: oak
      count: [1, 3]
      area: [-10, -63, -10, 10, -63, 10]

  ores:
    - type: emerald_ore
      count: [1, 3]
      area: [-12, -63, -12, 12, -63, 12]
      vein_size: 0

    - type: coal_ore
      count: [3, 6]
      area: [-12, -63, -12, 12, -63, 12]
      vein_size: 1

    - type: iron_ore
      count: [2, 4]
      area: [-10, -63, -10, 10, -63, 10]
      vein_size: 1

  mobs:
    - type: spider
      count: [1, 3]
      area: [-12, -62, -12, 12, -62, 12]
      difficulty: normal

  gamerule_overrides:
    doMobSpawning: "false"

  raw_cmds:
    # Ruined mossy cobblestone dungeon walls at the centre
    - "fill -4 -63 -4 4 -59 4 air"
    - "fill -4 -63 -4 4 -59 4 mossy_cobblestone hollow"
    - "setblock -4 -60 0 air"
    - "setblock 4 -60 0 air"
    # Chest inside the ruin
    - "setblock 0 -62 0 chest{Items:[{id:\"minecraft:iron_pickaxe\",Count:1b,Slot:0b}]}"
    # Moss carpet patches around the ruin
    - "setblock -6 -62 3 moss_carpet"
    - "setblock 7 -62 -5 moss_carpet"
    - "setblock -9 -62 -8 moss_carpet"
