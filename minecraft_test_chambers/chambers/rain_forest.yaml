# test_chambers/rain_forest.yaml
# Rainy night in a dark forest — harsh conditions, survival pressure.
# Player starts with instant_damage applied; mobs may be present.

name: rain_forest
description: "Rainy night in a forest — player starts damaged, survival pressure"

features:
  biome: minecraft:dark_forest
  time: night
  weather: rain
  difficulty: hard

  trees:
    - type: oak
      count: [2, 4]
      area: [-8, -63, -8, 8, -63, 8]

    - type: dark_oak
      count: [1, 2]
      area: [-7, -63, -7, 7, -63, 7]

  mobs:
    - type: zombie
      count: [0, 2]
      area: [-8, -62, -8, 8, -62, 8]
      difficulty: hard

    - type: skeleton
      count: [0, 1]
      area: [-8, -62, -8, 8, -62, 8]
      difficulty: hard

  gamerule_overrides:
    doMobSpawning: "false"

  raw_cmds:
    - "effect give @a minecraft:instant_damage 1 3 true"
