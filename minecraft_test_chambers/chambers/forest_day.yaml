# test_chambers/forest_day.yaml
# Dense forest during daytime. Rich gathering environment with multi-layer
# terrain, underground caves with ores, and peaceful surface mobs.
# Designed for resource-collection, mining, and survival scenarios.

name: forest_day
description: "Dense forest in daylight -- raised terrain, procedural caves with ores, peaceful mobs"
spawn_point: [0, -55, 0]

features:
  biome: minecraft:forest
  time: day
  weather: clear
  difficulty: peaceful

  gamerule_overrides:
    doMobSpawning: "false"

  trees:
    - type: oak
      count: [5, 8]
      area: [-14, -56, -14, 14, -56, 14]

    - type: birch
      count: [3, 5]
      area: [-12, -56, -12, 12, -56, 12]

    - type: dark_oak
      count: [1, 3]
      area: [-10, -56, -10, 10, -56, 10]

  caves:
    area: [-14, -63, -14, 14, -58, 14]
    tunnels: [2, 4]
    tunnel_length: [20, 40]
    branch_chance: 0.25
    room_chance: 0.15
    room_radius: [3, 4]
    min_radius: 1
    max_radius: 2
    entrances:
      - [0, -55, 5]
      - [9, -55, 0]

  ores:
    # Deep stone layer -- placed after caves are carved, so ores appear
    # on cave walls.  'replace: stone' ensures ores only go into solid rock.
    - type: coal_ore
      count: [10, 16]
      area: [-14, -63, -14, 14, -59, 14]
      vein_size: 3
      replace: stone

    - type: iron_ore
      count: [5, 9]
      area: [-12, -63, -12, 12, -60, 12]
      vein_size: 2
      replace: stone

    - type: copper_ore
      count: [3, 6]
      area: [-12, -62, -12, 12, -59, 12]
      vein_size: 2
      replace: stone

    - type: gold_ore
      count: [1, 3]
      area: [-8, -63, -8, 8, -62, 8]
      vein_size: 1
      replace: stone

    - type: diamond_ore
      count: [0, 1]
      area: [-6, -63, -6, 6, -63, 6]
      replace: stone

    # Shallow dirt layer -- exposed coal outcrops
    - type: coal_ore
      count: [2, 4]
      area: [-14, -58, -14, 14, -57, 14]
      replace: dirt

  mobs:
    - type: cow
      count: [2, 4]
      area: [-13, -55, -13, 13, -55, 13]

    - type: sheep
      count: [2, 3]
      area: [-13, -55, -13, 13, -55, 13]

    - type: chicken
      count: [3, 5]
      area: [-11, -55, -11, 11, -55, 11]

    - type: pig
      count: [1, 3]
      area: [-11, -55, -11, 11, -55, 11]

  inventory:
    mainhand: stone_pickaxe
    items:
      stone_pickaxe: 1

  raw_cmds:
    # -- Raised terrain (runs before caves/ores/mobs) --
    # Stone from bedrock up to Y=-59
    - "fill -32 -63 -32 32 -59 32 stone"
    # Dirt topsoil layers
    - "fill -32 -58 -32 32 -57 32 dirt"
    # Grass surface at Y=-56
    - "fill -32 -56 -32 32 -56 32 grass_block"

    # -- Surface decoration --
    # Wildflowers
    - "setblock 3 -55 -6 poppy"
    - "setblock -5 -55 8 dandelion"
    - "setblock 7 -55 3 cornflower"
    - "setblock -8 -55 -4 azure_bluet"
    - "setblock -3 -55 -9 oxeye_daisy"
    - "setblock 10 -55 -5 allium"
    # Coarse dirt patches
    - "fill 4 -56 -10 6 -56 -8 coarse_dirt"
    - "fill -9 -56 5 -7 -56 7 coarse_dirt"
    # Cobblestone boulder
    - "setblock -6 -55 -2 mossy_cobblestone"
    - "setblock -6 -56 -2 mossy_cobblestone"
    - "setblock -7 -56 -2 cobblestone"
