name: RecorderPlugin
version: '1.0-SNAPSHOT'
main: com.minecraftrecorder.RecorderPlugin
api-version: '1.20'
description: Records player actions to JSONL for LLM fine-tuning.
authors: [minecraft-test-chambers]

commands:
  recorder:
    description: Control the gameplay recorder.
    usage: /recorder <start [chamber] [seed]|stop|status>
    permission: recorder.use
    permission-message: You do not have permission to use this command.

permissions:
  recorder.use:
    description: Allows controlling the recorder.
    default: op
